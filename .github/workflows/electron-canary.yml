# Early warning: every week, try the app against the LATEST Electron.
# If the smoke test fails, a GitHub issue is opened automatically so you know
# an Electron update would break GreenRoom BEFORE you ship it to users.
name: Electron canary

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Upgrade to latest Electron
        id: bump
        run: |
          npm install --no-save electron@latest
          echo "version=$(node -p "require('electron/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Allow Electron sandbox (Ubuntu 24.04 restricts unprivileged userns)
        run: sudo sysctl -q -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Smoke test against latest Electron
        id: smoke
        run: xvfb-run --auto-servernum npm run smoke
      - name: Open an issue if the new Electron breaks the app
        if: failure() && steps.smoke.conclusion == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ steps.bump.outputs.version }}';
            const title = `Electron ${version} breaks GreenRoom (canary failure)`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'electron-canary',
            });
            if (existing.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title,
              labels: ['electron-canary', 'bug'],
              body: [
                `The weekly canary run failed against Electron **${version}**.`,
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Do not upgrade Electron until this is investigated.',
              ].join('\n'),
            });
