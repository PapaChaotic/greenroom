# Continuous security monitoring: npm audit on every push/PR and every week
# (so new CVEs against pinned deps still get caught), plus a staleness check
# that opens an issue when the pinned Electron major falls behind latest.
name: Security audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # --ignore-scripts: this workflow runs on pull_request, so it must not
      # execute lifecycle scripts from a PR's (untrusted) dependency tree.
      - run: npm ci --ignore-scripts
      - name: npm audit (fail on high+)
        run: npm audit --audit-level=high
      - name: Check Electron staleness
        id: stale
        run: |
          CURRENT=$(node -p "require('electron/package.json').version" | cut -d. -f1)
          LATEST=$(npm view electron dist-tags.latest | cut -d. -f1)
          echo "current=$CURRENT latest=$LATEST"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" -gt "$CURRENT" ]; then echo "stale=true" >> "$GITHUB_OUTPUT"; fi
      - name: Open an issue if Electron is a major behind
        if: steps.stale.outputs.stale == 'true' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const cur = '${{ steps.stale.outputs.current }}';
            const latest = '${{ steps.stale.outputs.latest }}';
            const title = `Electron ${cur}.x is behind latest (${latest}.x) — update needed`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'security',
            });
            if (existing.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, labels: ['security'],
              body: 'Chromium security fixes ship in new Electron majors. ' +
                    'Check the electron-canary workflow result, then upgrade and cut a release.',
            });
